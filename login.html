<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO Login</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
width:350px;
}

h2{
text-align:center;
color:#16a34a;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">

<h2>GUZO GO ADMIN</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"admin.html";

}catch(error){

document.getElementById("msg").innerText =
error.message;

}

}

</script>

</body>
  </html>
