  <style>

*{
margin:0;
padding:0;

font-family:'Segoe UI',sans-serif;

body{
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
}

header{
background:rgba(22,163,74,.9);
backdrop-filter:blur(12px);
color:white;
text-align:center;
padding:35px 20px;
box-shadow:0 4px 20px rgba(0,0,0,.3);
}

header h1{
font-size:42px;
font-weight:700;
letter-spacing:2px;
}

header p{
margin-top:8px;
font-size:16px;
opacity:.95;
}

.container{
max-width:750px;
margin:40px auto;
padding:20px;
}

.search-box{
background:rgba(255,255,255,.95);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h2{
text-align:center;
color:#16a34a;
margin-bottom:25px;
font-size:28px;
}

input{
width:100%;
padding:15px;
border:2px solid #e5e7eb;
border-radius:14px;
font-size:16px;
transition:.3s;
}

input:focus{
outline:none;
border-color:#16a34a;
box-shadow:0 0 10px rgba(22,163,74,.3);
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

button{
background:linear-gradient(135deg,#16a34a,#15803d);
color:white;
}

.admin-btn{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.card{
margin-top:25px;
background:white;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

width:150px;
height:150px;

}

<body>

<header>
<h1>🌍 GUZO GO</h1>
<p>Your Trusted Travel Partner</p>
</header>

<div class="container">

<div class="search-box">

<h2>Visa Verification</h2>

<input
type="text"
id="passportNumber"
placeholder="Enter Passport Number">

<button onclick="searchApplicant()">
Check Status
</button>

<button
class="admin-btn"
onclick="window.location.href='login.html'">
Admin Login
</button>

<div id="result"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.searchApplicant = async function(){

const passport =
document.getElementById("passportNumber").value.trim();

const result =
document.getElementById("result");

result.innerHTML = "Searching...";

try{

const querySnapshot =
await getDocs(collection(db,"applicants"));

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(data.passportNumber === passport){

found = true;

let statusClass = "pending";

if(data.status === "Approved"){
statusClass = "approved";
}

if(data.status === "Rejected"){
statusClass = "rejected";
}

result.innerHTML = `
<div class="card">

${data.photoUrl ? `
<img src="${data.photoUrl}" class="photo">
` : ""}

<h3>${data.fullName}</h3>

<p><b>Passport Number:</b> ${data.passportNumber}</p>

<p><b>Application ID:</b> ${data.applicationId}</p>

<p><b>Nationality:</b> ${data.nationality}</p><p><b>Date of Birth:</b> ${data.dob || "-"}</p><p><b>Gender:</b> ${data.gender || "-"}</p><p><b>Destination Country:</b> ${data.country || "-"}</p><p><b>Visa Type:</b> ${data.visaType || "-"}</p><p><b>Issue Date:</b> ${data.issueDate || "-"}</p><p><b>Expiry Date:</b> ${data.expiryDate || "-"}</p><p>
<span class="status ${statusClass}">
${data.status}
</span>
</p>

<div class="footer">
✅ Officially Verified by GUZO GO System
</div>

</div>
`;

}

});

if(!found){
result.innerHTML =
"<div class='card'>❌ No Record Found</div>";
}

}catch(error){

result.innerHTML =
"<div class='card'>"+error.message+"</div>";

}

}

</script>

</body>
