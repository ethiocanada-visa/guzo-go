<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO Visa Verification</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#16a34a;
color:white;
text-align:center;
padding:25px;
}

.container{
max-width:600px;
margin:30px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.card{
margin-top:20px;
padding:20px;
background:#f9f9f9;
border-radius:10px;
}

.status{
display:inline-block;
padding:8px 15px;
border-radius:20px;
color:white;
font-weight:bold;
background:#16a34a;
}
</style>
</head>
<body>

<header>
<h1>🌍 GUZO GO</h1>
<p>Your Trusted Travel Partner</p>
</header>

<div class="container">

<h2>Visa Verification</h2>

<input
type="text"
id="passportNumber"
placeholder="Enter Passport Number">

<button onclick="searchApplicant()">
Check Status
</button>

<div id="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.searchApplicant = async function(){

const passport =
document.getElementById("passportNumber").value.trim();

const result =
document.getElementById("result");

result.innerHTML = "Searching...";

const querySnapshot =
await getDocs(collection(db,"applicants"));

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(data.passportNumber === passport){

found = true;

result.innerHTML = `
<div class="card">

<h3>${data.fullName}</h3>

<p><b>Passport:</b>
${data.passportNumber}</p>

<p><b>Application ID:</b>
${data.applicationId}</p>

<p><b>Nationality:</b>
${data.nationality}</p>

<p>
<span class="status">
${data.status}
</span>
</p>

<p>
✅ Verified by GUZO GO
</p>

</div>
`;

}

});

if(!found){

result.innerHTML =
"<div class='card'>❌ No Record Found</div>";

}

}

</script>

</body>
</html>
