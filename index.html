<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO Visa Verification</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#e8f5e9,#ffffff);
min-height:100vh;
}

header{
background:linear-gradient(135deg,#16a34a,#15803d);
color:white;
text-align:center;
padding:35px 20px;
box-shadow:0 4px 15px rgba(0,0,0,.15);
}

header h1{
font-size:36px;
margin-bottom:8px;
}

.container{
max-width:650px;
margin:35px auto;
padding:20px;
}

.search-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#16a34a;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:2px solid #e5e7eb;
border-radius:12px;
font-size:16px;
}

input:focus{
outline:none;
border-color:#16a34a;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#16a34a;
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#15803d;
}

.card{
margin-top:25px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.1);
}

.card h3{
color:#16a34a;
margin-bottom:15px;
}

.info{
margin:10px 0;
font-size:16px;
}

.status{
display:inline-block;
padding:10px 18px;
border-radius:25px;
color:white;
font-weight:bold;
margin-top:10px;
}

.approved{
background:#16a34a;
}

.pending{
background:#f59e0b;
}

.rejected{
background:#dc2626;
}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#666;
}

.notfound{
text-align:center;
color:red;
font-weight:bold;
margin-top:20px;
}
</style>
</head>
<body>

<header>
<h1>🌍 GUZO GO</h1>
<p>Your Trusted Travel Partner</p>
</header>

<div class="container">

<div class="search-box">

<h2>Visa Verification</h2>

<input
type="text"
id="passportNumber"
placeholder="Enter Passport Number">

<button onclick="searchApplicant()">
Check Status
</button>

<div id="result"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.searchApplicant = async function(){

const passport =
document.getElementById("passportNumber").value.trim();

const result =
document.getElementById("result");

result.innerHTML = "Searching...";

try{

const querySnapshot =
await getDocs(collection(db,"applicants"));

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(data.passportNumber === passport){

found = true;

let statusClass = "pending";

if(data.status === "Approved"){
statusClass = "approved";
}

if(data.status === "Rejected"){
statusClass = "rejected";
}

result.innerHTML = `
<div class="card">

<h3>${data.fullName}</h3>

<div class="info">
<b>Passport Number:</b>
${data.passportNumber}
</div>

<div class="info">
<b>Application ID:</b>
${data.applicationId}
</div>

<div class="info">
<b>Nationality:</b>
${data.nationality}
</div>

<div class="info">
<b>Status:</b><br><br>

<span class="status ${statusClass}">
${data.status}
</span>
</div>

<div class="footer">
✅ Officially Verified by GUZO GO System
</div>

</div>
`;
}

});

if(!found){

result.innerHTML = `
<div class="notfound">
❌ No Record Found
</div>
`;

}

}catch(error){

result.innerHTML = `
<div class="notfound">
${error.message}
</div>
`;

}

}

</script>

</body>
</html>
